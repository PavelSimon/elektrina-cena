<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAM Data Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Graf ceny elektriny na spotovom "trhu" - okte.sk</h1>
    <button type="button" id="helpButton">Help</button>
    <a href="https://www.energiaweb.energy/">
        <button  type="submit" id="backButton">Back</button>
    </a>

    <!-- Help Modal -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Popis</h2>
                <button class="close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Zobrazenie dát o pohybu SPOTových cien elektriny na <a href="https://okte.sk" target="_blank">OKTE.sk</a></p>
            </div>
        </div>
    </div>
    <form id="dataForm">
        <button type="button" id="prevPeriod" title="Predchádzajúce obdobie">◄◄</button>
        <button type="button" id="prevDay" title="Predchádzajúci deň">◄</button>
        <label for="start_date">Start Date:</label>
        <input type="date" id="start_date" name="start_date" required>
        <label for="end_date">End Date:</label>
        <input type="date" id="end_date" name="end_date" required>
        <button type="button" id="nextDay" title="Nasledujúci deň">►</button>
        <button type="button" id="nextPeriod" title="Nasledujúce obdobie">►►</button>
        <button type="submit">Nakresli graf</button>
        <button type="button" id="updateData">Aktualizuj dáta k dnešku</button>
        <p id="updateStatus"></p>
    </form>
    <div id="stats">
        <p>Min: <span id="min"></span> € <small id="minWhen"></small></p>
        <p>Max: <span id="max"></span> € <small id="maxWhen"></small></p>
        <p>Priemer: <span id="average"></span> €</p>
        <p>Median: <span id="median"></span> €</p>
    </div>
    <div id="prevStats" style="display: none;">
        <p style="margin-bottom: 10px; font-weight: bold; color: #666;">Predchádzajúce obdobie:</p>
        <p>Min: <span id="prevMin"></span> € <small id="prevMinWhen"></small></p>
        <p>Max: <span id="prevMax"></span> € <small id="prevMaxWhen"></small></p>
        <p>Priemer: <span id="prevAverage"></span> €</p>
        <p>Median: <span id="prevMedian"></span> €</p>
    </div>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
